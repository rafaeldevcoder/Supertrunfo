<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL ARES-1 | ACTIVE COMMAND</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff003c;
            --bg-black: #020202;
            --glass: rgba(0, 242, 255, 0.05);
        }

        body {
            background-color: var(--bg-black);
            color: var(--neon-blue);
            font-family: 'Segoe UI', Monaco, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Moldura de Interface */
        .ui-frame {
            border: 2px solid var(--neon-blue);
            margin: 10px;
            flex: 1;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            grid-template-rows: 60px 1fr 150px;
            gap: 10px;
            padding: 10px;
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.2);
        }

        /* Top Bar */
        header {
            grid-column: 1 / span 3;
            border-bottom: 1px solid var(--neon-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: var(--glass);
        }

        /* Sidebar de Recursos */
        .sidebar {
            border-right: 1px solid var(--neon-blue);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Área Central (Câmara) */
        .viewport {
            position: relative;
            border: 1px solid var(--neon-blue);
            overflow: hidden;
            background: #000;
        }

        #mars-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.5s;
        }

        /* Terminal Interativo */
        .terminal-zone {
            grid-column: 1 / span 2;
            border-top: 1px solid var(--neon-blue);
            padding: 10px;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }

        #terminal-output {
            flex: 1;
            overflow-y: auto;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .input-line {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #cmd-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--neon-blue);
            color: white;
            flex: 1;
            outline: none;
            padding: 5px;
        }

        /* Controlos de Câmara */
        .controls {
            grid-column: 3;
            grid-row: 2 / span 2;
            border-left: 1px solid var(--neon-blue);
            padding: 10px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: var(--glass);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn:hover { background: var(--neon-blue); color: black; }

        .stat-box {
            background: var(--glass);
            padding: 10px;
            border-left: 4px solid var(--neon-blue);
        }

        .critical { color: var(--neon-red); border-color: var(--neon-red); }

    </style>
</head>
<body>

    <div class="ui-frame">
        <header>
            <div>SYSTEM: ONLINE</div>
            <div style="font-size: 1.5rem; letter-spacing: 5px;">ARES INTERFACE</div>
            <div id="mission-time">SOL 482 - 12:00:00</div>
        </header>

        <aside class="sidebar">
            <div class="stat-box">
                <small>OXIGÉNIO</small>
                <div id="ox-level">98%</div>
            </div>
            <div class="stat-box">
                <small>BATERIA</small>
                <div id="bat-level">75%</div>
            </div>
            <button class="btn critical" onclick="toggleAlert()">EMERGÊNCIA</button>
        </aside>

        <main class="viewport">
            <img id="mars-feed" src="https://www.nasa.gov/wp-content/uploads/2023/03/pia25640-perseverance-selfie-at-belva-crater-horizontal.jpg" alt="Mars">
            <div style="position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 5px;">
                CAM-01: GALE CRATER
            </div>
        </main>

        <div class="terminal-zone">
            <div id="terminal-output">
                <div>> Conexão estabelecida com Satélite MRO.</div>
                <div>> Digite 'ajuda' para comandos.</div>
            </div>
            <div class="input-line">
                <span>USER@MARS:~$</span>
                <input type="text" id="cmd-input" autofocus>
            </div>
        </div>

        <section class="controls">
            <h3>FILTROS DE VÍDEO</h3>
            <button class="btn" onclick="setFilter('none')">Normal</button>
            <button class="btn" onclick="setFilter('sepia(1) hue-rotate(320deg) saturate(3)')">Térmico</button>
            <button class="btn" onclick="setFilter('grayscale(1) brightness(1.2) contrast(1.5)')">Noturno</button>
            <button class="btn" onclick="setFilter('blur(5px) grayscale(1)')">Scan Profundo</button>
            
            <h3 style="margin-top:20px;">ACÇÕES</h3>
            <button class="btn" onclick="addOutput('A escanear minerais...')">Escanear Solo</button>
            <button class="btn" onclick="addOutput('Antena redirecionada para a Terra.')">Alinhar Antena</button>
        </section>
    </div>

    <script>
        // Relógio
        setInterval(() => {
            const now = new Date();
            document.getElementById('mission-time').innerText = "SOL 482 - " + now.toLocaleTimeString();
        }, 1000);

        // Controlo de Filtros
        function setFilter(filterStr) {
            document.getElementById('mars-feed').style.filter = filterStr;
            addOutput("Filtro de câmara alterado.");
        }

        // Lógica do Terminal
        const input = document.getElementById('cmd-input');
        const output = document.getElementById('terminal-output');

        function addOutput(text) {
            const div = document.createElement('div');
            div.innerText = "> " + text;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const cmd = input.value.toLowerCase();
                addOutput(cmd);
                
                if (cmd === 'ajuda') {
                    addOutput("Comandos: status, limpar, scan, alerta, bio");
                } else if (cmd === 'status') {
                    addOutput("Sistemas nominais. Oxigénio: 98%. Temperatura: -55°C.");
                } else if (cmd === 'limpar') {
                    output.innerHTML = "";
                } else if (cmd === 'alerta') {
                    toggleAlert();
                } else if (cmd === 'scan') {
                    addOutput("A iniciar scan infravermelho... Nenhum sinal biológico detetado.");
                } else {
                    addOutput("Comando desconhecido: " + cmd);
                }
                
                input.value = "";
            }
        });

        function toggleAlert() {
            const frame = document.querySelector('.ui-frame');
            if (frame.style.borderColor === 'rgb(255, 0, 60)') {
                frame.style.borderColor = 'var(--neon-blue)';
                document.body.style.color = 'var(--neon-blue)';
                addOutput("Alerta cancelado.");
            } else {
                frame.style.borderColor = 'var(--neon-red)';
                document.body.style.color = 'var(--neon-red)';
                addOutput("ALERTA CRÍTICO ATIVADO!");
            }
        }
    </script>
</body>
</html>
